name: "🚀 Feature Request"
description: "Suggest a new idea or improvement for VeriWorkly."
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: components
    attributes:
      label: "Affected Apps / Packages"
      description: "Which parts of the monorepo are affected? (Select all that apply)"
      multiple: true
      options:
        - "Site (apps/site)"
        - "Studio (apps/studio)"
        - "Server (apps/server)"
        - "Docs Platform (apps/docs-platform)"
        - "Blog Platform (apps/blog-platform)"
        - "UI Library (packages/ui)"
        - "Infrastructure / Other"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is."
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      description: "Describe the ideal behavior of this feature."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      description: "Any alternative solutions or features you've considered."
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Add any other context or screenshots about the feature request here."
