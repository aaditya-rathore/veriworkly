name: "🐛 Bug Report"
description: "Tell us about a bug you've found."
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: dropdown
    id: components
    attributes:
      label: "Affected Apps / Packages"
      description: "Which parts of the monorepo are affected? (Select all that apply)"
      multiple: true
      options:
        - "Site (apps/site)"
        - "Studio (apps/studio)"
        - "Server (apps/server)"
        - "Docs Platform (apps/docs-platform)"
        - "Blog Platform (apps/blog-platform)"
        - "UI Library (packages/ui)"
        - "API Client (packages/api-client)"
        - "Infrastructure / Other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "How can we replicate this issue?"
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: "Environment Information"
      description: "OS, Browser version, Node.js version, etc."
      placeholder: |
        - OS: Windows 11
        - Browser: Chrome 120
        - Node.js: 20.10.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Relevant Logs"
      description: "Paste any console logs or server errors here."
  - type: textarea
    id: fix
    attributes:
      label: "Proposed Fix / Suggestions"
      description: "If you have a solution in mind or want to suggest a fix, please provide it here."
